services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.12
    container_name: trafficmind-clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_DB: trafficmind
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./clickhouse/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro

  collector:
    build: .
    container_name: trafficmind-collector
    env_file: .env
    depends_on:
      - clickhouse
    ports:
      - "8088:8088"

volumes:
  clickhouse_data:
